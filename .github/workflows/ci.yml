name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      # - run: pnpm typecheck

      - run: pnpm run build

      - name: Backend tests (SQLite)
        run: pnpm test
        env:
          NODE_ENV: test
          TZ: UTC
          PORT: 3333
          HOST: localhost
          APP_NAME: fleetai
          APP_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          APP_URL: http://localhost:3333
          LOG_LEVEL: error
          SESSION_DRIVER: cookie
          QUEUE_DRIVER: sync
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test
          DB_PASSWORD: test
          DB_DATABASE: test
          AI_PROVIDER: mistral
          MISTRAL_API_KEY: test
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
          SMTP_HOST: localhost
          SMTP_PORT: 1025
          SMTP_SECURE: false
          MAIL_FROM_ADDRESS: noreply@fleetai.app
          MAIL_FROM_NAME: FleetAi

      - name: Frontend tests (Vitest)
        run: pnpm test:inertia
