name: Docker

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  build-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Les noms de dépôt OCI doivent être en minuscules ; `github.repository`
      # conserve la casse de l'owner (ex. MaloLebrin) → on minuscule le nom d'image.
      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Ajouter ici l'étape de déploiement selon la plateforme cible :
      # Fly.io  → flyctl deploy --image ${{ env.IMAGE }}:${{ github.sha }}
      # Railway → railway deploy
      # K8s     → kubectl set image deployment/app app=${{ env.IMAGE }}:...
